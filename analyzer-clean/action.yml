# =============================================================================
# REPO: capture-logs-actions
# ARCHIVO: analyzer-clean/action.yml
#
# PROPOSITO:
#   Composite action que limpia el output raw del analyzer y lo parsea
#   a JSON estructurado. Es reutilizable: cualquier proyecto con un
#   analyzer que siga el formato "VISTA POR CATEGORIAS" puede usar esta acción.
#
# COMO SE USA (en un workflow):
#   - name: Clean and Parse Analyzer Output
#     uses: xvr8/capture-logs-actions/analyzer-clean@main
#     with:
#       input_file: logs/analyzer_raw.log
#       output_clean: logs/analyzer_clean.log
#       output_structured: artifacts/analyzer_structured.json
#       pattern: "VISTA POR CATEGORIAS"
#
# github.action_path:
#   Apunta al directorio analyzer-clean/ DENTRO del repo capture-logs-actions.
#   Los scripts en scripts/ se ejecutan desde ahí, no desde el repo del proyecto.
# =============================================================================

name: Analyzer Clean and Parse
description: Extrae sección relevante del log del analyzer y la parsea a JSON estructurado

inputs:
  input_file:
    description: "Path al log raw del analyzer (relativo al workspace)"
    required: true
  output_clean:
    description: "Path de salida del log limpio"
    required: true
    default: "logs/analyzer_clean.log"
  output_structured:
    description: "Path de salida del JSON estructurado"
    required: true
    default: "artifacts/analyzer_structured.json"
  pattern:
    description: "Patrón que marca el inicio de la sección relevante"
    required: false
    default: "VISTA POR CATEGORIAS"

runs:
  using: composite
  steps:
    - name: Install Python dependencies
      shell: bash
      run: pip install -q --no-input 2>/dev/null || true

    - name: Clean analyzer output
      shell: bash
      run: |
        bash "${{ github.action_path }}/scripts/analyzer_clean.sh" \
          --input   "${{ inputs.input_file }}" \
          --output  "${{ inputs.output_clean }}" \
          --pattern "${{ inputs.pattern }}"

    - name: Parse to structured JSON
      shell: bash
      run: |
        python "${{ github.action_path }}/scripts/analyzer_parser.py" \
          --input  "${{ inputs.output_clean }}" \
          --output "${{ inputs.output_structured }}"

    - name: Validate JSON output
      shell: bash
      run: |
        python -c "import json; json.load(open('${{ inputs.output_structured }}'))"
        echo "::notice::analyzer_structured.json validado OK"
